# cargo-audit configuration - release audit transitive exceptions
#
# `cargo audit` reports 0 vulnerabilities for this project. The remaining
# warnings are "unmaintained" / "unsound"-class advisories on transitive crates
# we do not depend on directly and cannot upgrade independently. Until upstream
# packages move off them, keep the exceptions explicit so actionable
# vulnerabilities are not lost in noise. Re-review this list whenever Tauri,
# pdf-extract, or lopdf is upgraded.
#
# Each entry is a RUSTSEC advisory id. To see why an advisory still applies,
# run `cargo audit` with this file removed.
[advisories]
ignore = [
    # GTK3 bindings - unmaintained; transitive via tauri on Linux only.
    "RUSTSEC-2024-0411", # atk
    "RUSTSEC-2024-0412", # atk-sys
    "RUSTSEC-2024-0413", # gdk
    "RUSTSEC-2024-0414", # gdk-sys
    "RUSTSEC-2024-0415", # gdkwayland-sys / gdkx11
    "RUSTSEC-2024-0416", # gdkx11-sys
    "RUSTSEC-2024-0417", # gtk
    "RUSTSEC-2024-0418", # gtk-sys
    "RUSTSEC-2024-0419", # gtk3-macros
    "RUSTSEC-2024-0420", # atk / glib family
    # proc-macro-error - unmaintained; transitive via macro tooling.
    "RUSTSEC-2024-0370",
    # unic family - unmaintained; transitive via Tauri urlpattern.
    "RUSTSEC-2025-0075", # unic-char-range
    "RUSTSEC-2025-0080", # unic-common
    "RUSTSEC-2025-0081", # unic-char-property
    "RUSTSEC-2025-0098", # unic-ucd-version
    "RUSTSEC-2025-0100", # unic-ucd-ident
    # ttf-parser - unmaintained; transitive via pdf-extract/lopdf.
    "RUSTSEC-2026-0192",
    # glib - target-specific Tauri stack warning, not reachable in Windows tree.
    "RUSTSEC-2024-0429",
]