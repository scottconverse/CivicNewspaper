<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEC (GG-B1): defense-in-depth CSP for the published site. script-src 'none'
         blocks inline and external scripts, including script-based URL navigations;
         style-src allows the bundled stylesheet plus this template's inline style= attributes. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; object-src 'none'; base-uri 'none'; frame-ancestors 'none'">
    <title>{{SITE_TITLE}}</title>
    <meta name="description" content="{{SITE_SUBTITLE}}">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="print.css" media="print">
    <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="feed.xml">
    {{CUSTOM_STYLE}}
</head>
<body class="{{LAYOUT_CLASS}}">
    <header>
        {{LOGO_HTML}}
        <h1 class="site-title"><a href="index.html" style="color: inherit; text-decoration: none;">{{SITE_TITLE}}</a></h1>
        <p class="site-subtitle">{{SITE_SUBTITLE}}</p>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="ethics.html">Ethics Policy</a>
            <a href="how-we-report.html">How We Report</a>
            <a href="corrections.html">Corrections Ledger</a>
            <a href="feed.xml">RSS Feed</a>
        </div>
    </header>

    <main>
        <div class="editorial-grid">
            <div class="article-list">
                {{ARTICLES}}
            </div>
            <div class="sidebar">
                {{SIDEBAR}}
            </div>
        </div>
    </main>

    <footer>
        {{FOOTER_NOTICE}}
    </footer>
</body>
</html>
