name: Check Design Tokens

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "main", "v*" ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "audit-*/**"
  pull_request:
    branches: [ "main", "v*" ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "audit-*/**"

jobs:
  check-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify all var(--token) references are declared in App.css
        run: node scripts/check-design-tokens.mjs
