# fix(v0.2.3): WV-3 self-test sed regex check
name: Check Notices Version Consistency

on:
  push:
    branches: [ "main", "v*" ]
  pull_request:
    branches: [ "main", "v*" ]

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Ollama version in fetch script matches NOTICES.md
        run: |
          V=$(grep -E "^OLLAMA_VERSION=" scripts/fetch-ollama-binaries.sh | sed -E 's/.*="?([^"]+)"?.*/\1/')
          echo "Found Ollama version: $V in fetch script"
          if [ -z "$V" ]; then
            echo "FAIL: Could not extract OLLAMA_VERSION from scripts/fetch-ollama-binaries.sh"
            exit 1
          fi
          if grep -q "$V" NOTICES.md; then
            echo "OK: $V matches NOTICES.md"
          else
            echo "FAIL: Version $V not found in NOTICES.md"
            exit 1
          fi
