concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# fix(v0.2.3): WV-3 self-test sed regex check
name: Check Notices Version Consistency

on:
  push:
    branches: [ "main", "v*" ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "audit-*/**"
  pull_request:
    branches: [ "main", "v*" ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "audit-*/**"

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Ollama runtime metadata is documented
        run: |
          V=$(grep -E 'OLLAMA_RUNTIME_VERSION: &str = ' src-tauri/src/core/llm.rs | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Found app-managed Ollama runtime version: $V"
          if [ -z "$V" ]; then
            echo "FAIL: Could not extract OLLAMA_RUNTIME_VERSION from src-tauri/src/core/llm.rs"
            exit 1
          fi
          if grep -q "$V" NOTICES.md; then
            echo "OK: $V matches NOTICES.md"
          else
            echo "FAIL: Version $V not found in NOTICES.md"
            exit 1
          fi
