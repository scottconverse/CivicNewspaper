name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  rust:
    runs-on: [self-hosted, Linux, scott-desktop]
    steps:
      - uses: actions/checkout@v4

      - name: Verify DoD script integrity (hash check)
        run: |
          if [ ! -f scripts/verify-v0.2-phase-1-dod.sh ] || [ ! -f scripts/.dod-phase-1.sha256 ]; then
            echo "ℹ Phase 1 DoD script not present on this branch — skipping hash check"
            exit 0
          fi
          EXPECTED=$(tr -d '[:space:]' < scripts/.dod-phase-1.sha256)
          ACTUAL=$(sha256sum scripts/verify-v0.2-phase-1-dod.sh | awk '{print $1}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "❌ DoD script hash mismatch:"
            echo "   expected: $EXPECTED"
            echo "   actual:   $ACTUAL"
            echo ""
            echo "scripts/verify-v0.2-phase-1-dod.sh was modified after directive write-time."
            echo "The DoD script is owned by the operator, not the dev pipeline."
            echo "Reject this branch and re-issue the directive from the canonical script."
            exit 1
          fi
          echo "✓ DoD script integrity verified ($ACTUAL)"

      - name: Verify Phase 2 DoD script integrity (hash check)
        run: |
          if [ ! -f scripts/verify-v0.2-phase-2-dod.sh ] || [ ! -f scripts/.dod-phase-2.sha256 ]; then
            echo "ℹ Phase 2 DoD script not present on this branch — skipping hash check"
            exit 0
          fi
          EXPECTED=$(tr -d '[:space:]' < scripts/.dod-phase-2.sha256)
          ACTUAL=$(sha256sum scripts/verify-v0.2-phase-2-dod.sh | awk '{print $1}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "❌ Phase 2 DoD script hash mismatch:"
            echo "   expected: $EXPECTED"
            echo "   actual:   $ACTUAL"
            echo ""
            echo "scripts/verify-v0.2-phase-2-dod.sh was modified after directive write-time."
            echo "The DoD script is owned by the operator, not the dev pipeline."
            echo "Reject this branch and re-issue the directive from the canonical script."
            exit 1
          fi
          echo "✓ Phase 2 DoD script integrity verified ($ACTUAL)"

      - name: Verify Phase 3 DoD script integrity (hash check)
        run: |
          if [ ! -f scripts/verify-v0.2-phase-3-dod.sh ] || [ ! -f scripts/.dod-phase-3.sha256 ]; then
            echo "ℹ Phase 3 DoD script not present on this branch — skipping hash check"
            exit 0
          fi
          EXPECTED=$(tr -d '[:space:]' < scripts/.dod-phase-3.sha256)
          ACTUAL=$(sha256sum scripts/verify-v0.2-phase-3-dod.sh | awk '{print $1}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "❌ Phase 3 DoD script hash mismatch:"
            echo "   expected: $EXPECTED"
            echo "   actual:   $ACTUAL"
            echo ""
            echo "scripts/verify-v0.2-phase-3-dod.sh was modified after directive write-time."
            echo "The DoD script is owned by the operator, not the dev pipeline."
            echo "Reject this branch and re-issue the directive from the canonical script."
            exit 1
          fi
          echo "✓ Phase 3 DoD script integrity verified ($ACTUAL)"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cargo fmt
        working-directory: ./src-tauri
        run: cargo fmt --check

      - name: Cargo clippy
        working-directory: ./src-tauri
        run: cargo clippy -- -D warnings

      - name: Cargo test
        working-directory: ./src-tauri
        run: cargo test --all

  frontend:
    needs: rust
    runs-on: [self-hosted, Linux, scott-desktop]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Vitest
        run: npm test
      - run: npm run build
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy
      - name: Run Phase 1 DoD verification
        if: hashFiles('scripts/verify-v0.2-phase-1-dod.sh') != ''
        run: bash scripts/verify-v0.2-phase-1-dod.sh
      - name: Run Phase 2 DoD verification
        if: hashFiles('scripts/verify-v0.2-phase-2-dod.sh') != ''
        run: bash scripts/verify-v0.2-phase-2-dod.sh
      - name: Run Phase 3 DoD verification
        if: hashFiles('scripts/verify-v0.2-phase-3-dod.sh') != ''
        run: bash scripts/verify-v0.2-phase-3-dod.sh
