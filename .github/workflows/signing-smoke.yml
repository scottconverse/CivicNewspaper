name: Windows Signing Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-sign-verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch Ollama binaries
        run: bash scripts/fetch-ollama-binaries.sh

      - name: Azure token preflight (fail-fast)
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          $body = @{
            client_id = $env:AZURE_CLIENT_ID
            client_secret = $env:AZURE_CLIENT_SECRET
            grant_type = "client_credentials"
            scope = "https://management.azure.com/.default"
          }
          $uri = "https://login.microsoftonline.com/$env:AZURE_TENANT_ID/oauth2/v2.0/token"
          try {
            Invoke-RestMethod -Method Post -Uri $uri -Body $body -ErrorAction Stop | Out-Null
            Write-Host "Azure token preflight succeeded."
          } catch {
            throw "Azure token preflight failed: $($_.Exception.Message)"
          }

      - name: Install pinned Artifact Signing module
        shell: pwsh
        run: |
          Install-Module -Name ArtifactSigning -RequiredVersion 0.1.8 -Scope CurrentUser -Force -Repository PSGallery
          "$env:GITHUB_WORKSPACE\scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build and sign Windows NSIS installer
        uses: tauri-apps/tauri-action@v0
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        with:
          args: --config src-tauri/tauri.windows-signing.conf.json --target x86_64-pc-windows-msvc --bundles nsis -- --locked

      - name: Dump signing diagnostics
        if: failure()
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "civicnewspaper-signing.log"
          if (Test-Path -LiteralPath $log) { Get-Content -LiteralPath $log } else { Write-Host "Signer did not create a diagnostic log." }

      - name: Locate NSIS installer
        shell: pwsh
        run: |
          $folder = "src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis"
          $installers = @(Get-ChildItem -LiteralPath $folder -Filter "*.exe" -File)
          if ($installers.Count -ne 1) {
            throw "Expected exactly one NSIS installer; found $($installers.Count)."
          }
          "INSTALLER_PATH=$($installers[0].FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify installer, application, and uninstaller signatures (fail-closed)
        shell: pwsh
        run: |
          ./scripts/verify-windows-signatures.ps1 -Installer $env:INSTALLER_PATH -ReceiptPath signing-smoke-receipt.json
          $receipt = Get-Content -Raw signing-smoke-receipt.json | ConvertFrom-Json
          $receipt | Add-Member -NotePropertyName commit -NotePropertyValue "${{ github.sha }}"
          $receipt | ConvertTo-Json -Depth 6 | Set-Content -LiteralPath signing-smoke-receipt.json -Encoding utf8

      - name: Upload signed installer and receipt
        uses: actions/upload-artifact@v4
        with:
          name: civicnewspaper-signed-installer-${{ github.sha }}
          path: |
            ${{ env.INSTALLER_PATH }}
            signing-smoke-receipt.json
          if-no-files-found: error
          retention-days: 7
