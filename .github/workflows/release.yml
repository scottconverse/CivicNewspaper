name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APPIMAGE_EXTRACT_AND_RUN: 1

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            os: [self-hosted, Linux, scott-desktop]
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            os: macos-latest
            target: x86_64-apple-darwin
          - platform: macos-latest-arm
            os: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          
      - name: Add macOS target
        if: matrix.target == 'x86_64-apple-darwin' || matrix.target == 'aarch64-apple-darwin'
        run: rustup target add ${{ matrix.target }}
          
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          
      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
          
      - name: Install frontend dependencies
        run: npm ci
        
      - name: Clean stale cargo locks
        if: matrix.platform == 'ubuntu-latest'
        run: |
          find src-tauri/target -name ".cargo-lock" -delete 2>/dev/null || true
          find /.cargo -name ".package-cache" -delete 2>/dev/null || true
          find /.cargo -name "*.lock" -delete 2>/dev/null || true
          find /root/.cargo -name ".package-cache" -delete 2>/dev/null || true
          find /root/.cargo -name "*.lock" -delete 2>/dev/null || true

      - name: Fetch Ollama binaries
        run: bash scripts/fetch-ollama-binaries.sh
        
      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "CivicNewspaper ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
          
      - name: Verify release artifacts
        run: |
          bash scripts/verify-release.sh
