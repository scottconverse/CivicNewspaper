name: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  # GG-C2: mandatory test gate. release.yml previously built & published
  # installers on a tag push with NO test run (ci.yml keys on branch pushes, not
  # tags), so the full test suite was bypassed at exactly the moment it matters.
  # This job runs the whole suite (after the same Ollama-binary fetch CI does) and
  # every build job `needs:` it, so a red suite aborts the release before any
  # artifact is produced or uploaded.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy, llvm-tools-preview

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Fetch Ollama binaries
        run: bash scripts/fetch-ollama-binaries.sh

      - name: Cargo fmt check
        working-directory: ./src-tauri
        run: cargo fmt --check

      - name: Cargo clippy
        working-directory: ./src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Cargo test (full)
        working-directory: ./src-tauri
        run: cargo test --all --locked

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Rust coverage gate
        working-directory: ./src-tauri
        run: |
          mkdir -p ../coverage
          cargo llvm-cov --lib --lcov --output-path ../coverage/rust.lcov --fail-under-regions 68 --fail-under-functions 60 --fail-under-lines 72

      - name: Setup Node.js for tests
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Vitest coverage gate
        run: npm run test:coverage

      - name: Preserve coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: release-coverage-reports
          path: coverage/

  hosted-release-evidence:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js for evidence gate
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Require exact-tag local RC and cleanroom evidence
        run: node scripts/verify-hosted-release-evidence.mjs "${{ github.ref_name }}"

  release:
    needs: hosted-release-evidence
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch Ollama binaries
        run: bash scripts/fetch-ollama-binaries.sh
        
      - name: Build Windows NSIS installer
        uses: tauri-apps/tauri-action@v0
        with:
          # GG-C2: --locked is passed through Tauri to Cargo after `--`, forcing
          # the build to use the committed Cargo.lock so a drifting transitive
          # dependency can't enter a release that CI never saw.
          args: --target ${{ matrix.target }} --bundles nsis -- --locked

      - name: Locate the NSIS installer
        shell: pwsh
        run: |
          $installers = @(Get-ChildItem -LiteralPath "src-tauri\target\${{ matrix.target }}\release\bundle\nsis" -Filter "*.exe" -File)
          if ($installers.Count -ne 1) {
            throw "Expected exactly one NSIS installer; found $($installers.Count)."
          }
          "INSTALLER_PATH=$($installers[0].FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Azure token preflight (fail-fast)
        shell: pwsh
        run: |
          $body = @{
            client_id = "${{ secrets.AZURE_CLIENT_ID }}"
            client_secret = "${{ secrets.AZURE_CLIENT_SECRET }}"
            grant_type = "client_credentials"
            scope = "https://management.azure.com/.default"
          }
          $uri = "https://login.microsoftonline.com/${{ secrets.AZURE_TENANT_ID }}/oauth2/v2.0/token"
          try {
            Invoke-RestMethod -Method Post -Uri $uri -Body $body -ErrorAction Stop | Out-Null
            Write-Host "Azure token preflight succeeded."
          } catch {
            throw "Azure token preflight failed: $($_.Exception.Message)"
          }

      - name: Sign NSIS installer with Azure Artifact Signing
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: scottconverse-signing
          certificate-profile-name: ScottConversePublic
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          files: ${{ env.INSTALLER_PATH }}
          timestamp-rfc3161: http://timestamp.acs.microsoft.com

      - name: Verify Authenticode signature (fail-closed)
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature $env:INSTALLER_PATH
          Write-Host "Signature status: $($sig.Status)"
          if ($sig.Status -ne "Valid") {
            throw "Installer signature is not valid."
          }
          if (-not $sig.SignerCertificate) {
            throw "Installer has no signer certificate."
          }
          Write-Host "Signer: $($sig.SignerCertificate.Subject)"

      - name: Create draft release and upload signed installer
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft --prerelease --title "The Civic Desk ${{ github.ref_name }}" --notes "DRAFT Windows public beta. Do not publish until SHA256SUMS, Authenticode signature verification, release-integrity verification, and local RC/cleanroom evidence for this exact tag have been reviewed. Verify SHA256SUMS before running."
          }
          gh release upload "${{ github.ref_name }}" $env:INSTALLER_PATH --repo "${{ github.repository }}" --clobber
          
      - name: Verify release artifacts
        run: |
          bash scripts/verify-release.sh

  # After the Windows public-beta build has uploaded its installers, aggregate a single
  # SHA256SUMS manifest covering all published assets and attach it to the release.
  # This is the manifest docs/install.md, README.md, and FAQ.md tell users to verify
  # against; without this job it 404s and installer provenance checks are incomplete.
  checksums:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all published release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --dir release-assets

      - name: Generate combined SHA256SUMS
        run: |
          : > SHA256SUMS
          while IFS= read -r f; do
            ( cd release-assets && sha256sum "$f" ) >> SHA256SUMS
          done < <(find release-assets -maxdepth 1 -type f ! -name 'SHA256SUMS*' -printf '%P\n' | sort)
          if [ ! -s SHA256SUMS ]; then
            echo "FAIL: no release assets were found to checksum"
            exit 1
          fi
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Upload SHA256SUMS to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" SHA256SUMS \
            --repo "${{ github.repository }}" --clobber

      - name: Release-integrity gate (manifest present + every listed artifact published)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/verify-release-assets.sh "${{ github.ref_name }}"
