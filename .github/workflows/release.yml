name: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APPIMAGE_EXTRACT_AND_RUN: 1

jobs:
  # GG-C2: mandatory test gate. release.yml previously built & published
  # installers on a tag push with NO test run (ci.yml keys on branch pushes, not
  # tags), so the full test suite was bypassed at exactly the moment it matters.
  # This job runs the whole suite (after the same Ollama-binary fetch CI does) and
  # every build job `needs:` it, so a red suite aborts the release before any
  # artifact is produced or uploaded.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Fetch Ollama binaries
        run: bash scripts/fetch-ollama-binaries.sh

      - name: Cargo fmt check
        working-directory: ./src-tauri
        run: cargo fmt --check

      - name: Cargo clippy
        working-directory: ./src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Cargo test (full)
        working-directory: ./src-tauri
        run: cargo test --all --locked

      - name: Setup Node.js for tests
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Vitest
        run: npm test

  release:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            os: macos-latest
            target: x86_64-apple-darwin
          - platform: macos-latest-arm
            os: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          
      - name: Add macOS target
        if: matrix.target == 'x86_64-apple-darwin' || matrix.target == 'aarch64-apple-darwin'
        run: rustup target add ${{ matrix.target }}
          
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          
      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
          
      - name: Install frontend dependencies
        run: npm ci
        
      - name: Clean stale cargo locks
        if: matrix.platform == 'ubuntu-latest'
        run: |
          find src-tauri/target -name ".cargo-lock" -delete 2>/dev/null || true
          find /.cargo -name ".package-cache" -delete 2>/dev/null || true
          find /.cargo -name "*.lock" -delete 2>/dev/null || true
          find /root/.cargo -name ".package-cache" -delete 2>/dev/null || true
          find /root/.cargo -name "*.lock" -delete 2>/dev/null || true

      - name: Fetch Ollama binaries
        run: bash scripts/fetch-ollama-binaries.sh
        
      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "The Civic Desk ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') }}
          # GG-C2: --locked is passed through Tauri to Cargo after `--`, forcing
          # the build to use the committed Cargo.lock so a drifting transitive
          # dependency can't enter a release that CI never saw.
          args: --target ${{ matrix.target }} -- --locked
          
      - name: Verify release artifacts
        run: |
          bash scripts/verify-release.sh

  # After every platform build has uploaded its installers, aggregate a single
  # SHA256SUMS manifest covering all published assets and attach it to the release.
  # This is the manifest docs/install.md, README.md, and FAQ.md tell users to verify
  # against — without this job it 404s and the "trust-without-signing" model is unactionable.
  checksums:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all published release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --dir release-assets

      - name: Generate combined SHA256SUMS
        run: |
          : > SHA256SUMS
          while IFS= read -r f; do
            ( cd release-assets && sha256sum "$f" ) >> SHA256SUMS
          done < <(find release-assets -maxdepth 1 -type f ! -name 'SHA256SUMS*' -printf '%P\n' | sort)
          if [ ! -s SHA256SUMS ]; then
            echo "FAIL: no release assets were found to checksum"
            exit 1
          fi
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Upload SHA256SUMS to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" SHA256SUMS \
            --repo "${{ github.repository }}" --clobber

      - name: Release-integrity gate (manifest present + every listed artifact published)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/verify-release-assets.sh "${{ github.ref_name }}"
