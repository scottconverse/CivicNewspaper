# SPDX-License-Identifier: Apache-2.0
# Pre-approved directive for v0.2 Phase 4 pipeline run.
# Bound to manifest.yaml and scope-lock.yaml in the same directory via dict-equality.
# CI hash-checks content_hash before the pipeline runs; any local edit fails.

version: 1

# Computed AFTER all other fields are final; pasted in as the last edit before
# committing. The accompanying scripts/.directive-2026-05-25-phase-4.sha256 file
# pins the same hash for CI hash-check defense-in-depth.
content_hash: ""

author:
  name: "Scott Converse"
  email: "sconverse@gmail.com"

authority:
  type: "release_directive"
  reference: ".agent-workflows/PROJECT_CONTROL_PLANE.md:8"

preapproved:
  manifest:
    pipeline_run:
      id: "2026-05-25-phase-4-source-tier-prompts-daily-scan-rewrite"
      type: feature
      branch: "v0.2-phase-4"
      goal: "Ship a real bundled prompt library, a one-click Daily Scan that uses the local LLM to surface civic story leads, an explicit three-tier source taxonomy on every source, and a one-click Plain Language rewrite for finished drafts."
      allowed_paths:
        - ".agent-runs/2026-05-25-phase-4-source-tier-prompts-daily-scan-rewrite/"
        - "src-tauri/migrations/0004_source_tier.sql"
        - "src-tauri/migrations/0005_daily_scans.sql"
        - "src-tauri/src/core/db.rs"
        - "src-tauri/src/core/prompts.rs"
        - "src-tauri/src/core/daily_scan.rs"
        - "src-tauri/src/core/mod.rs"
        - "src-tauri/src/core/migrations.rs"
        - "src-tauri/src/core/tests.rs"
        - "src-tauri/src/lib.rs"
        - "src-tauri/src/tauri_cmds.rs"
        - "src-tauri/prompts/"
        - "src-tauri/tauri.conf.json"
        - "src-tauri/Cargo.toml"
        - "src-tauri/Cargo.lock"
        - "src/App.tsx"
        - "src/useApp.ts"
        - "src/components/Workbench.tsx"
        - "src/components/Workbench.test.tsx"
        - "src/components/SystemStatus.tsx"
        - "src/components/SystemStatus.test.tsx"
        - "src/components/SourcesPanel.tsx"
        - "src/components/SourcesPanel.test.tsx"
        - "src/components/LeadQueue.tsx"
        - "src/components/PublishPanel.tsx"
        - "src/components/DailyScanResults.tsx"
        - "src/components/DailyScanResults.test.tsx"
        - "package.json"
        - "package-lock.json"
        - "SECURITY.md"
      forbidden_paths:
        - "src-tauri/src/core/auth.rs"
        - "src-tauri/src/core/scraper.rs"
        - "src-tauri/src/core/detectors.rs"
        - "src-tauri/src/core/compiler.rs"
        - "src-tauri/src/core/guardrails.rs"
        - "src-tauri/src/core/llm.rs"
        - "src-tauri/src/core/backups.rs"
        - "src-tauri/src/core/server.rs"
        - "src-tauri/src/core/discovery.rs"
        - "src-tauri/src/core/diagnostics.rs"
        - "src-tauri/src/core/server_tests.rs"
        - "src-tauri/migrations/0001_init.sql"
        - "src-tauri/migrations/0003_settings.sql"
        - "scripts/"
        - ".github/workflows/"
        - ".agent-workflows/"
      non_goals:
        - "Do not implement Phase 5 features (integrity audit, pending stories) — those belong to Run B."
        - "Do not implement Phase 6 features (sourcing connectors, PDF/Legistar/YouTube/Whisper) — Run C."
        - "Do not modify the deterministic guardrails in guardrails.rs — those are the binding rules; the prompt library is advisory only."
        - "Do not auto-suppress, downgrade, or block stories based on source tier — tier is a transparency label, not a gate."
        - "Do not weaken the v0.1.1 XSS test or strict CSP."
        - "Do not modify ci.yml, DoD scripts, or hash pins — operator-owned."
        - "Do not delete any prior-phase named test (test_compiler_xss_safe, test_settings_round_trip, test_gather_diagnostics_has_all_fields, test_export_diagnostics_writes_valid_json, test_export_diagnostics_path_validation_rejects_traversal)."
      expected_outputs:
        - "Migration src-tauri/migrations/0004_source_tier.sql exists, UTF-8 LF encoded, adds NOT NULL CHECK column 'tier' to sources table with values ('official_record', 'news_reporting', 'community_signal')."
        - "Migration src-tauri/migrations/0005_daily_scans.sql exists, UTF-8 LF, creates daily_scan_runs and daily_scan_leads tables with the schema specified in the directive."
        - "src-tauri/src/core/prompts.rs defines pub fn load_prompt + Tauri commands list_prompts and get_prompt; get_prompt input is validated against the enumerated id set (no path traversal)."
        - "src-tauri/src/core/daily_scan.rs defines pub fn run_daily_scan + Tauri command run_daily_scan; city/state inputs validated as short ASCII strings."
        - "src-tauri/prompts/ contains the bundled prompt library; minimum files: aggregator/01-daily-scan.md, story/07-plain-language.md."
        - "Source struct in db.rs has a 'tier' field; CRUD reads and writes it."
        - "Tauri command plain_language_rewrite(draft_id: i32) returns rewritten text from the local LLM using prompts/story/07-plain-language.md."
        - "Workbench.tsx has a Prompt Library dropdown populated from list_prompts and a 'Rewrite for Newsletter / Email / Facebook' button."
        - "SystemStatus.tsx has a 'Run Daily Scan' button, disabled when Ollama unreachable."
        - "DailyScanResults.tsx renders leads in rank order with tier badges and an 'Open in Workbench' action that creates a draft lead."
        - "Source tier badges render in LeadQueue.tsx and PublishPanel.tsx."
        - "SECURITY.md has been updated to document the bundled prompt library (read-only local resource, no network calls in load_prompt) and the Daily Scan (local LLM only, results stay on disk)."
        - "Six new Rust tests pass by exact name: test_source_tier_migration, test_source_tier_backfill_media_lead, test_list_prompts_returns_bundled, test_get_prompt_loads_aggregator, test_daily_scan_parses_fixture_response, test_plain_language_rewrite_invokes_ollama."
        - "cargo test --all returns >= 24 passed (Phase 3 baseline 18 + 6 new). Anti-padding enforced by named-test-presence checks."
        - "DailyScanResults.test.tsx asserts: renders 3 fixture leads with tier badges; 'Open in Workbench' fires correct action with correct lead id. vitest count grows accordingly."
        - "cargo fmt --check, cargo clippy -- -D warnings, npm run build all pass."
        - "All 10 backend Rust files except db.rs show zero diff against origin/main (content AND mode bits)."
      required_gates:
        - human_approval_manifest
        - human_approval_plan
        - policy_passed
        - tests_passed
        - human_approval_merge
        - directive_bound
        - scope_lock_authority
        - execute_readiness
      risk: medium
      rollback_plan: "Revert the squash-merge commit on main. The two migrations are additive (no down-migration needed for the column add or the new tables); leaving them applied on a databases of a user who upgraded past the merge and then reverted is harmless — the columns/tables become unused but cause no errors."
      definition_of_done: "Phase 4 is done when every expected_output above is observably true, cargo test --all is green at >= 24 passing tests with the six named tests present, vitest is green with the new DailyScanResults cases, cargo fmt and clippy and vite build are green, all forbidden paths show zero diff against origin/main, the in-app workflow (add a source with tier=official_record → scrape it → click Run Daily Scan → leads appear in DailyScanResults → Open in Workbench creates a draft lead) works end-to-end with a real Ollama backend, the in-app workflow (draft a story → click Rewrite for Newsletter → output appears in a side panel) works end-to-end, and pre-merge audit-lite returns zero Blockers and zero Criticals."
      director_notes:
        - "researcher: the canonical detailed Phase 4 spec is at docs/spec/v0.2-phase-4.md. Read it before any research output. It is the authoritative source for sub-feature requirements (4a Source Tier, 4b Prompt Library, 4c Daily Scan, 4d Plain Language Rewrite), test names, schema, input-validation requirements, and the prerequisite-to-verify section. The manifest, scope-lock, and directive in this run-dir are the contract; docs/spec/v0.2-phase-4.md is the design."
        - "researcher: confirm whether src-tauri/prompts/ exists in the repo. If it does NOT, identify whether prompt content should be imported from a sibling repo (operator referenced civic-newsroom and civic-scanner in prior session memory). If neither exists, the dev must create at least the two minimum required prompts (aggregator/01-daily-scan.md and story/07-plain-language.md) with content matching the spec; the aggregator prompt must contain the literal string 'CIVIC NEWSROOM - DAILY CIVIC NEWS AGGREGATOR' (it is the unfakeable anchor that test_get_prompt_loads_aggregator asserts)."
        - "researcher: confirm whether call_local_ollama is already pub in llm.rs and reachable from daily_scan.rs / a new plain_language_rewrite command without modifying llm.rs (which is scope-locked). If a small refactor of llm.rs is required to expose the function, escalate to operator before modifying — do not silently widen scope."
        - "researcher: check tauri.conf.json bundle.resources for the existing pattern for shipping non-Rust assets; the prompts/ directory must be bundled so tauri::api::path::resolve_resource can find it at runtime."
        - "planner: order test-write before execute. The six named Rust tests should be authored as failing tests first (test_source_tier_migration et al). Frontend DailyScanResults.test.tsx should be authored alongside the component."
        - "executor: get_prompt(id: String) is renderer-supplied. Validate id against the enumerated list from list_prompts (do not pass through to filesystem). The grep pattern for the directive's input-validation acceptance check is `list_prompts|VALID_PROMPT_IDS|prompt_id_allowed` inside the get_prompt body."
        - "executor: run_daily_scan(city: String, state: String, since_hours: u32) — city and state are substituted into prompt placeholders, not used for filesystem/SQL/exec. Still validate as short ASCII (regex `^[A-Za-z][A-Za-z .'-]{0,63}$` or similar). since_hours bound to <= 168 (one week) to prevent unbounded evidence pulls."
        - "executor: do NOT use --force-with-lease for the first push of v0.2-phase-4 to origin. Use `git push -u origin v0.2-phase-4`. After verifying `gh run list` returns a non-empty result, you may report CI status; before then, do not."
      advances_target: "v0.2 Phase 4 — Source Tier + Prompt Library + Daily Scan + Plain Language Rewrite"
      authorizing_source: ".agent-workflows/PROJECT_CONTROL_PLANE.md:8"

  scope_lock:
    current_rung: "v0.2-phase-4"
    canonical_source: ".agent-workflows/PROJECT_CONTROL_PLANE.md"
    rung_title: "Source Tier + Prompt Library + Daily Scan + Plain Language Rewrite"
    proves: "This run delivers Phase 4 of the v0.2 milestone: a real bundled prompt library, a Daily Scan flow backed by the local-LLM aggregator prompt, an explicit three-tier source taxonomy on every source, and a one-click Plain Language rewrite for finished drafts. No Phase 5/6/7/8 features are implemented in this run."
    required_modules:
      - "src-tauri/src/core/prompts.rs"
      - "src-tauri/src/core/daily_scan.rs"
      - "src-tauri/migrations/0004_source_tier.sql"
      - "src-tauri/migrations/0005_daily_scans.sql"
      - "src/components/DailyScanResults.tsx"
    allowed_feature_terms:
      - "source tier"
      - "official_record"
      - "news_reporting"
      - "community_signal"
      - "prompt library"
      - "list_prompts"
      - "get_prompt"
      - "load_prompt"
      - "daily scan"
      - "run_daily_scan"
      - "DailyScanResults"
      - "plain language"
      - "plain_language_rewrite"
      - "aggregator"
      - "tier badge"
      - "Open in Workbench"
    forbidden_feature_terms_without_replan:
      - "integrity audit"
      - "audit_draft_integrity"
      - "pending stories"
      - "mark_pending"
      - "reopen_pending"
      - "Legistar"
      - "Granicus"
      - "PrimeGov"
      - "NovusAGENDA"
      - "PDF extract"
      - "YouTube transcript"
      - "Whisper"
      - "faster-whisper"
      - "provenance sidebar"
      - "WebVTT"
      - "v0.2.0-beta"
      - "release.yml"
    scope_bullets:
      - "Add a three-tier source taxonomy ('official_record', 'news_reporting', 'community_signal') to the sources table via migration 0004; backfill type='media_lead' to tier='news_reporting'; default the rest to 'official_record'."
      - "Add a tier selector when adding or editing a source; render the source's tier as a badge in LeadQueue and PublishPanel."
      - "Bundle prompt files under src-tauri/prompts/; expose them to the frontend via list_prompts (returns enumerated [{id, category, title, path, description}]) and get_prompt(id: String) -> Result<String, String>. Input id must be validated against the enumerated set; no path-traversal sink."
      - "Add a Prompt Library dropdown in Workbench's draft generation area; selecting a prompt pastes its body into the system-prompt field for the next Ollama call."
      - "Create migration 0005 with daily_scan_runs and daily_scan_leads tables per the spec."
      - "Implement run_daily_scan(city: String, state: String, since_hours: u32) -> Result<DailyScanRun, String> that pulls recent evidence_items, loads the aggregator prompt, substitutes placeholders, calls call_local_ollama, parses the structured response, and persists one daily_scan_runs row + N daily_scan_leads rows. Validate city/state as short ASCII; bound since_hours <= 168."
      - "Add a 'Run Daily Scan' button in SystemStatus (disabled when Ollama unreachable) that navigates to a new DailyScanResults view; the view renders leads with tier badges and an 'Open in Workbench' action that creates a draft lead."
      - "Implement plain_language_rewrite(draft_id: i32) -> Result<String, String> using prompts/story/07-plain-language.md; expose via 'Rewrite for Newsletter / Email / Facebook' button in Workbench. Do NOT auto-persist; the UI decides save-as-variant vs copy-to-clipboard."
      - "Add six named Rust tests: test_source_tier_migration, test_source_tier_backfill_media_lead, test_list_prompts_returns_bundled, test_get_prompt_loads_aggregator, test_daily_scan_parses_fixture_response, test_plain_language_rewrite_invokes_ollama. The aggregator-prompt test must assert the unfakeable anchor string."
      - "Update SECURITY.md to document the bundled prompt library (read-only, no network in load_prompt) and the Daily Scan (local LLM only, no auto-upload of results)."
    exit_criteria:
      - "All expected_outputs in manifest.yaml are observably true."
      - "cargo test --all >= 24 passed with the six named tests present."
      - "vitest passes with the new DailyScanResults.test.tsx cases."
      - "cargo fmt --check, cargo clippy -- -D warnings, npm run build all green."
      - "All nine remaining scope-locked backend Rust files (auth.rs, scraper.rs, detectors.rs, compiler.rs, guardrails.rs, llm.rs, backups.rs, server.rs, discovery.rs, diagnostics.rs) show zero diff against origin/main — content and mode bits."
      - "Phase 1, 2, 3 DoD scripts continue to pass on CI (no regressions to prior phases)."
      - "Pre-merge audit-lite returns zero Blockers and zero Criticals; any Major findings are triaged and either fixed or explicitly accepted."
    replan_required_if:
      - "src-tauri/prompts/ resource directory does not exist AND no prior repo can be identified as the import source (escalate to operator before fabricating prompt content)"
      - "call_local_ollama is not pub or requires modification of llm.rs to call from daily_scan.rs (escalate, do not silently widen scope to llm.rs)"
      - "README, CHANGELOG, or docs/ files name another rung as active"
      - "implementation path belongs to Phase 5, 6, 7, or 8"
      - "user wording in any sub-prompt or comment conflicts with PROJECT_CONTROL_PLANE.md"
      - "any scope-locked backend Rust file (auth, scraper, detectors, compiler, guardrails, llm, backups, server, discovery, diagnostics) requires modification — STOP and escalate"
      - "any operator-owned file (.github/workflows/, scripts/, .agent-workflows/) requires modification"

acceptance:
  plan:
    - id: "plan-has-implementation-section"
      type: "section"
      artifact: "plan.md"
      heading: "Implementation"
      min_chars: 200
    - id: "plan-names-tests"
      type: "regex"
      artifact: "plan.md"
      pattern: "(cargo test|npm test|vitest|failing-tests-report\\.md)"
      flags: "i"
      min_count: 1
    - id: "plan-keeps-test-first-order"
      type: "callable"
      name: "mentions_failing_tests_before_execute"
    - id: "plan-names-the-six-rust-tests"
      type: "regex"
      artifact: "plan.md"
      pattern: "test_(source_tier_migration|source_tier_backfill_media_lead|list_prompts_returns_bundled|get_prompt_loads_aggregator|daily_scan_parses_fixture_response|plain_language_rewrite_invokes_ollama)"
      flags: ""
      min_count: 6
    - id: "plan-acknowledges-input-validation"
      type: "regex"
      artifact: "plan.md"
      pattern: "(input validation|validate.*(city|state|prompt.?id|since_hours)|prompt.?id allowed|VALID_PROMPT_IDS|ASCII)"
      flags: "i"
      min_count: 1
    - id: "plan-acknowledges-prompts-dir-prereq"
      type: "regex"
      artifact: "plan.md"
      pattern: "(src-tauri/prompts|bundled prompt|CIVIC NEWSROOM - DAILY CIVIC NEWS AGGREGATOR)"
      flags: ""
      min_count: 1

  manager:
    - id: "verifier-covers-expected-outputs"
      type: "callable"
      name: "verifier_covers_manifest_expected_outputs"
    - id: "no-unresolved-caveats"
      type: "callable"
      name: "no_unresolved_open_caveats"
    - id: "drift-report-clean"
      type: "callable"
      name: "drift_report_is_clean"
    - id: "scope-locked-files-untouched"
      type: "regex"
      artifact: "drift-report.md"
      pattern: "(auth\\.rs|scraper\\.rs|detectors\\.rs|compiler\\.rs|guardrails\\.rs|llm\\.rs|backups\\.rs|server\\.rs|discovery\\.rs|diagnostics\\.rs|ci\\.yml|verify-v0\\.2-phase-.*-dod\\.sh|\\.dod-phase-.*\\.sha256).*modified"
      flags: "i"
      min_count: 0
      max_count: 0
