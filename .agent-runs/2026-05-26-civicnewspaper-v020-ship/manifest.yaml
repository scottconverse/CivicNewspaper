pipeline_run:
  id: "2026-05-26-civicnewspaper-v020-ship"
  type: "civicnewspaper-v020-ship"
  branch: "main"
  goal: "Ship CivicNewspaper v0.2.0 — finish Phase 4, bundle Ollama as sidecar, fix onboarding model-pull, full doc pass with diagrams, landing page refresh, tag v0.2.0 release, publish Pages."
  allowed_paths:
    - "src/"
    - "src-tauri/"
    - "docs/"
    - ".github/workflows/"
    - ".pipelines/"
    - ".agent-runs/"
    - "README.md"
    - "CHANGELOG.md"
    - "SECURITY.md"
    - "FAQ.md"
    - "CONTRIBUTING.md"
    - "NOTICES.md"
    - "carried-debt.md"
    - "package.json"
    - "package-lock.json"
    - "scripts/"
  forbidden_paths:
    - "LICENSE"
    - ".gitattributes"
  non_goals:
    - "Do not procure or wire OS code-signing certificates (Authenticode, Apple Developer ID); operator has explicitly declined this."
    - "Do not configure the Tauri auto-updater; operator has deferred. Leave the plugin dormant via plugins.updater.active = false. Tracked as P5-002 in carried-debt.md."
    - "Do not bundle Ollama models (5+ GB); models are pulled at first run by the onboarding wizard."
    - "Do not add automatic crash reporting or telemetry; user-initiated diagnostic export from Phase 3 is the policy."
    - "Do not add features beyond the 14 Phase 4 findings + Ollama sidecar + onboarding model-pull + docs + landing + release pipeline."
    - "Do not build the diff-preview modal for Plain Language Rewrite — tracked as P5-001 in carried-debt.md."
  expected_outputs:
    - "Branch v0.2-phase-4 merged to main with all 14 Phase 4 findings remediated."
    - "src-tauri/Cargo.toml, src-tauri/tauri.conf.json, package.json all at version 0.2.0."
    - "src-tauri/tauri.conf.json plugins.updater.active = false (updater dormant for v0.2.0; tracked as P5-002 in carried-debt.md)."
    - "src-tauri/binaries/ollama-* present for x86_64-unknown-linux-gnu, x86_64-apple-darwin, aarch64-apple-darwin, x86_64-pc-windows-msvc.exe."
    - "src-tauri/tauri.conf.json bundle.externalBin includes binaries/ollama."
    - "src-tauri/src/core/llm.rs spawns Ollama sidecar at startup; lifecycle managed; no orphan on quit."
    - "NOTICES.md exists with Ollama MIT attribution + SHA256 + source URL."
    - "src/components/OnboardingWizard.tsx model-pull step works end-to-end with streaming progress."
    - "docs/architecture.md, docs/user_manual.md, README.md, FAQ.md, docs/install.md all updated; manual has three parts (non-technical / technical / developer)."
    - "docs/assets/{hero,onboarding-empty-state,publish-success}.png exist and are referenced from landing + onboarding."
    - "Mermaid diagrams render inline on GitHub Pages."
    - "docs/index.html landing refreshed with v0.2.0 features, per-platform smart-download buttons, install-guide callouts."
    - "audit-lite reports clean at stages 02, 08, 10."
    - "audit-team report clean with zero Blockers and zero Criticals at stage 13"
    - "Tag v0.2.0 pushed; release.yml workflow succeeds on all three platforms; release assets present."
    - "GitHub Pages serves the updated landing page"
    - "carried-debt file contains P5-001 and forensic phase-4-gamed branch reference"

  required_gates:
    - "human_approval_manifest"
    - "human_approval_plan"
    - "policy_passed"
    - "tests_passed"
    - "human_approval_merge"
    - "directive_bound"
    - "scope_lock_authority"
    - "execute_readiness"
  risk: "high"
  rollback_plan: "Revert merge commit on main; delete v0.2.0 tag locally and from origin (git tag -d v0.2.0; git push origin :refs/tags/v0.2.0); delete the GitHub release; if Ollama sidecar caused issues, revert to last v0.1.x main."
  definition_of_done: "A non-technical newsroom operator can land on https://scottconverse.github.io/CivicNewspaper/, click the platform-appropriate download button, install the resulting binary (following the unsigned-binary workaround documented in docs/install.md), launch the app, perform onboarding including the Ollama model download, add a source, run a Daily Scan, see results, generate a draft, and publish — all without touching the terminal or installing Ollama separately. CHANGELOG.md [0.2.0] documents every shipped capability. audit-team returns zero Blockers and zero Criticals. carried-debt.md tracks the diff-preview modal as P5-001 for Phase 5."
  director_notes:
    - "All four director decisions D1-D5 from the Phase 4 remediation directive remain binding for any Phase 4 work touched here."
    - "Ollama strategy is hybrid: bundle the Ollama binary as sidecar (resolves the install cliff); models pulled at first run via onboarding wizard (avoids 5+ GB installer)."
    - "Diagrams: Mermaid for technical (renders on GitHub, diff-friendly); nanobanana for marketing/landing illustrations only."
    - "No OS code signing. Mitigations: docs/install.md with platform-specific bypass screenshots; SHA256 verification trust story; reputation building via stable release URLs."
    - "audit-team's pre-release findings at stage 13 are the gate — operator review only fires if Blocker or Critical surfaces."
  advances_target: "v0.2.0 ship"
  authorizing_source: ""
  override_active_target: "Bypassing active-target check: this run executes the pre-approved v0.2.0 ship sequence to merge Phase 4 remediation and release v0.2.0."

