  - "release.yml"
scope_bullets:
  - "Source tier classification migration 0004_source_tier.sql"
  - "sources table column with backfill"
  - "tier badges in LeadQueue and PublishPanel"
  - "tier selector in SourcesPanel"
  - "bundled prompt library access via list_prompts and get_prompt Tauri commands"
  - "enumerated id validation for prompts"
  - "Workbench Prompt Library dropdown"
  - "Daily Scan migration 0005_daily_scans.sql with daily_scan_runs and daily_scan_leads tables"
  - "from_scan_lead_id column on leads"
  - "run_daily_scan Tauri command with city/state ASCII validation and since_hours<=168 bound"
  - "DailyScanResults view with Open in Workbench"
  - "Plain Language rewrite plain_language_rewrite Tauri command"
  - "Workbench Rewrite for Newsletter button"
exit_criteria:
  - "cargo test includes the 6 new tests above, all passing"
  - "cargo test --all total tests >= 24"
  - "CI green on all DoDs"
  - "pre-merge audit-lite returns zero Blockers and zero Criticals"
  - "Manual smoke tests pass for Daily Scan and Rewrite for Newsletter"
replan_required_if:
  - "src-tauri/prompts/ resource directory does not exist"
  - "call_local_ollama is not pub or requires modification of llm.rs"
  - "any scope-locked backend Rust file (auth, scraper, compiler, guardrails, llm, backups, server, discovery, diagnostics) requires modification — STOP and escalate"
  - "any operator-owned file (.github/workflows/, scripts/, .agent-workflows/, docs/spec/, src-tauri/prompts/) requires modification"
  - "implementation path belongs to Phase 5, 6, 7, or 8"
  - "user wording in any sub-prompt or comment conflicts with PROJECT_CONTROL_PLANE.md"
